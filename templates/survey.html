<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>画室满意度调查</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>画室满意度调查</h1>
        <p>您的反馈将帮助我们变得更好</p>
    </div>

    <!-- ── 步骤指示器 ── -->
    <div class="card" id="teacher-section">
        <div class="card-title">
            <div class="icon teacher">1</div> 上课老师评价
        </div>
        <div class="step-label">
            <span class="active" id="step1-label">① 选择班级</span>
            <span id="step2-label">② 选择老师</span>
            <span id="step3-label">③ 评分</span>
        </div>
        <div class="steps">
            <div class="step active" id="step1-bar"></div>
            <div class="step" id="step2-bar"></div>
            <div class="step" id="step3-bar"></div>
        </div>

        <!-- 步骤1: 选班级 -->
        <div id="step1-content">
            <div class="select-grid" id="class-grid">
                {% for c in classes %}
                <div class="select-item" data-id="{{ c.id }}">{{ c.name }}</div>
                {% endfor %}
            </div>
        </div>

        <!-- 步骤2: 选老师 -->
        <div id="step2-content" style="display:none">
            <div class="select-grid" id="teacher-grid"></div>
            <div class="nav-btns" style="margin-top:16px">
                <button class="btn btn-outline" onclick="goStep(1)">← 返回选班级</button>
            </div>
        </div>

        <!-- 步骤3: 评分 -->
        <div id="step3-content" style="display:none">
            <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px" id="selected-info"></p>
            <div id="score-dimensions"></div>
            <div class="nav-btns" style="margin-top:12px">
                <button class="btn btn-outline" onclick="goStep(2)">← 返回选老师</button>
                <button class="btn btn-primary" onclick="confirmTeacher()" style="flex:2">确认该老师评分</button>
            </div>
        </div>

        <!-- 已评教师列表 -->
        <div id="rated-list" style="margin-top:16px"></div>
    </div>

    <!-- ── 饭堂评价 ── -->
    <div class="card" id="canteen-section">
        <div class="card-title">
            <div class="icon canteen">2</div> 饭堂评价
        </div>
        <div class="score-section">
            <div class="score-label">
                饭菜口味
                <div class="emoji-anchor"><span>😡</span><span>🏆</span></div>
            </div>
            <div class="score-row" data-dim="饭菜口味"></div>
        </div>
        <div class="score-section">
            <div class="score-label">
                服务态度
                <div class="emoji-anchor"><span>😡</span><span>🏆</span></div>
            </div>
            <div class="score-row" data-dim="服务态度"></div>
        </div>
    </div>

    <!-- ── 宿舍评价 ── -->
    <div class="card" id="dorm-section">
        <div class="card-title">
            <div class="icon dorm">3</div> 宿舍评价
        </div>
        <div class="score-section">
            <div class="score-label">
                宿舍管理
                <div class="emoji-anchor"><span>😡</span><span>🏆</span></div>
            </div>
            <div class="score-row" data-dim="宿舍管理"></div>
        </div>
        <div class="score-section">
            <div class="score-label">
                宿管服务
                <div class="emoji-anchor"><span>😡</span><span>🏆</span></div>
            </div>
            <div class="score-row" data-dim="宿管服务"></div>
        </div>
    </div>

    <!-- ── 个人建议 ── -->
    <div class="card">
        <div class="card-title">
            <div class="icon note">4</div> 个人建议
        </div>
        <textarea class="ta-box" id="suggestion" placeholder="请在此输入您的建议或意见（选填，限500字）" maxlength="500" oninput="updateCharCount()"></textarea>
        <div class="char-count"><span id="char-count">0</span>/500</div>
    </div>

    <!-- ── 提交 ── -->
    <button class="btn btn-primary" id="submit-btn" onclick="submitSurvey()">提交问卷</button>
    <p style="text-align:center;font-size:12px;color:var(--text-secondary);margin-top:8px">请确认所有评分填写完成后再提交</p>
</div>

<div class="toast" id="toast"></div>

<script>
const DIMS = {
    sketch_still: '素描静物',
    sketch_portrait: '素描头像',
    color: '色彩',
    quick_sketch: '速写',
    lecture: '讲课',
    tutoring: '辅导',
    homework: '作业点评'
};

let currentStep = 1;
let selectedClassId = null;
let selectedTeacherId = null;
let selectedTeacherName = '';
let teachers = [];
let teacherRatings = []; // {teacher_id, name, scores: {dim_key: score}}

async function loadTeachers(classId) {
    const res = await fetch(`/api/teachers?class_id=${classId}`);
    teachers = await res.json();
    const grid = document.getElementById('teacher-grid');
    grid.innerHTML = teachers.map(t => `
        <div class="select-item" data-id="${t.id}">
            ${t.name}
            ${t.is_head_teacher ? ' <small style="color:var(--primary)">班主任</small>' : ''}
        </div>
    `).join('');
    grid.querySelectorAll('.select-item').forEach(el => {
        el.addEventListener('click', () => {
            grid.querySelectorAll('.select-item').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedTeacherId = parseInt(el.dataset.id);
            selectedTeacherName = teachers.find(t => t.id === selectedTeacherId).name;
        });
    });
}

function goStep(step) {
    currentStep = step;
    document.getElementById('step1-content').style.display = step === 1 ? 'block' : 'none';
    document.getElementById('step2-content').style.display = step === 2 ? 'block' : 'none';
    document.getElementById('step3-content').style.display = step === 3 ? 'block' : 'none';
    document.getElementById('step1-bar').className = 'step' + (step >= 1 ? ' done' : '');
    document.getElementById('step2-bar').className = 'step' + (step >= 2 ? ' done' : '') + (step === 2 ? ' active' : '');
    document.getElementById('step3-bar').className = 'step' + (step === 3 ? ' active' : '');
    document.getElementById('step1-label').className = step === 1 ? 'active' : '';
    document.getElementById('step2-label').className = step === 2 ? 'active' : '';
    document.getElementById('step3-label').className = step === 3 ? 'active' : '';

    if (step === 3) {
        document.getElementById('selected-info').textContent =
            `正在为「${selectedTeacherName}」评分（1=非常不满意，10=非常满意）`;
        renderScoreDimensions();
    }
}

function renderScoreDimensions() {
    const container = document.getElementById('score-dimensions');
    // Check if already rated
    const existing = teacherRatings.find(r => r.teacher_id === selectedTeacherId);
    container.innerHTML = Object.entries(DIMS).map(([key, label]) => `
        <div class="score-section">
            <div class="score-label">
                ${label}
                <div class="emoji-anchor"><span>😡</span><span>🏆</span></div>
            </div>
            <div class="score-row">
                ${Array.from({length: 10}, (_, i) => i + 1).map(n => `
                    <div class="score-btn${existing && existing.scores[key] === n ? ' picked' : ''}"
                         onclick="pickScore(this, '${key}')">${n}</div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function pickScore(el, dimKey) {
    el.parentElement.querySelectorAll('.score-btn').forEach(b => b.classList.remove('picked'));
    el.classList.add('picked');
}

function confirmTeacher() {
    const scores = {};
    let allPicked = true;
    document.querySelectorAll('#score-dimensions .score-section').forEach(section => {
        const dimBlocks = section.querySelectorAll('.score-row');
        dimBlocks.forEach(row => {
            const picked = row.querySelector('.score-btn.picked');
            if (picked) {
                // Find the dim key from parent structure
                const label = section.querySelector('.score-label').textContent.trim().replace(/[😡🏆]/g, '').trim();
                const dimKey = Object.entries(DIMS).find(([k, v]) => v === label)?.[0];
                if (dimKey) scores[dimKey] = parseInt(picked.textContent);
            } else {
                allPicked = false;
            }
        });
    });

    if (!allPicked) {
        showToast('请为所有维度打分后再确认', 'error');
        return;
    }

    // Replace or add
    const idx = teacherRatings.findIndex(r => r.teacher_id === selectedTeacherId);
    const entry = { teacher_id: selectedTeacherId, name: selectedTeacherName, scores };
    if (idx >= 0) teacherRatings[idx] = entry;
    else teacherRatings.push(entry);

    renderRatedList();
    goStep(2);
    showToast(`已记录「${selectedTeacherName}」的评分`);
}

function renderRatedList() {
    const el = document.getElementById('rated-list');
    if (teacherRatings.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML = `
        <div style="border-top:2px solid var(--border);padding-top:12px">
            <div style="font-size:13px;font-weight:600;margin-bottom:8px">已评价教师（${teacherRatings.length}人）</div>
            ${teacherRatings.map(r => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px">
                    <span>${r.name}</span>
                    <span style="color:var(--primary);cursor:pointer" onclick="editRating(${r.teacher_id})">修改</span>
                </div>
            `).join('')}
        </div>`;
}

function editRating(tid) {
    const r = teacherRatings.find(r => r.teacher_id === tid);
    if (!r) return;
    selectedTeacherId = tid;
    selectedTeacherName = r.name;
    goStep(3);
}

// Init score buttons for canteen & dorm
document.querySelectorAll('.score-row').forEach(row => {
    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('div');
        btn.className = 'score-btn';
        btn.textContent = i;
        btn.addEventListener('click', function() {
            row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('picked'));
            this.classList.add('picked');
        });
        row.appendChild(btn);
    }
});

// Init class grid click
document.getElementById('class-grid').addEventListener('click', async function(e) {
    const item = e.target.closest('.select-item');
    if (!item) return;
    this.querySelectorAll('.select-item').forEach(el => el.classList.remove('selected'));
    item.classList.add('selected');
    selectedClassId = parseInt(item.dataset.id);
    await loadTeachers(selectedClassId);
    teacherRatings = []; // reset ratings when class changes
    selectedTeacherId = null;
    renderRatedList();
    goStep(2);
});

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || '');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

function updateCharCount() {
    document.getElementById('char-count').textContent = document.getElementById('suggestion').value.length;
}

async function submitSurvey() {
    if (!selectedClassId) { showToast('请先选择班级', 'error'); return; }

    // Gather canteen & dorm scores
    const canteen = {};
    document.querySelectorAll('#canteen-section .score-row').forEach(row => {
        const dim = row.dataset.dim;
        const picked = row.querySelector('.score-btn.picked');
        if (picked) canteen[dim] = parseInt(picked.textContent);
    });

    const dormitory = {};
    document.querySelectorAll('#dorm-section .score-row').forEach(row => {
        const dim = row.dataset.dim;
        const picked = row.querySelector('.score-btn.picked');
        if (picked) dormitory[dim] = parseInt(picked.textContent);
    });

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '提交中...';

    try {
        const res = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                class_id: selectedClassId,
                teacher_ratings: teacherRatings,
                canteen,
                dormitory,
                suggestion: document.getElementById('suggestion').value.trim()
            })
        });
        const data = await res.json();
        if (data.ok) {
            window.location.href = '/survey/done';
        } else {
            showToast(data.error || '提交失败', 'error');
            btn.disabled = false;
            btn.textContent = '提交问卷';
        }
    } catch (e) {
        showToast('网络错误，请重试', 'error');
        btn.disabled = false;
        btn.textContent = '提交问卷';
    }
}
</script>
</body>
</html>
