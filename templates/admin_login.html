<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 登录</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container admin-login">
    <h2>管理后台登录</h2>
    <div class="card">
        <div class="form-group">
            <label>用户名</label>
            <input class="form-input" type="text" id="username" placeholder="请输入用户名" autofocus>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input class="form-input" type="password" id="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
        </div>
        <p class="form-error" id="login-error">用户名或密码错误</p>
        <button class="btn btn-primary" onclick="login()">登 录</button>
    </div>
</div>
<script>
async function login() {
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { err.style.display = 'block'; return; }
    const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.ok) window.location.href = '/admin/dashboard';
    else err.style.display = 'block';
}
</script>
</body>
</html>
