services:
  - type: web
    name: studio-survey
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: studio-survey-db
          property: connectionString

databases:
  - name: studio-survey-db
    plan: free
    postgresMajorVersion: 16
